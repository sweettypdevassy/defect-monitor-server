version: '3.8'

services:
  defect-monitor:
    build: .
    container_name: defect-monitor-server
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
      # Mount Chrome profile for cookie access (Linux)
      - ${HOME}/.config/google-chrome:/root/.config/google-chrome:ro
      # Mount Chrome profile for cookie access (macOS)
      - ${HOME}/Library/Application Support/Google/Chrome:/root/Library/Application Support/Google/Chrome:ro
    environment:
      - TZ=Asia/Kolkata
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - defect-monitor-network

networks:
  defect-monitor-network:
    driver: bridge

