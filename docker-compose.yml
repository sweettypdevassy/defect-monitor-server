services:
  defect-monitor:
    build: .
    container_name: defect-monitor-server
    ports:
      - "5001:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./src:/app/src
      - ./templates:/app/templates
      - ./static:/app/static
      # Persist Playwright browser data (CRITICAL for avoiding repeated 2FA)
      - playwright-cache:/root/.cache/ms-playwright
      - playwright-config:/root/.config
      # Mount Chrome profile for cookie access (Linux)
      - ${HOME}/.config/google-chrome:/root/.config/google-chrome:ro
      # Mount Chrome profile for cookie access (macOS)
      - ${HOME}/Library/Application Support/Google/Chrome:/root/Library/Application Support/Google/Chrome:ro
    environment:
      - TZ=Asia/Kolkata
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - defect-monitor-network

volumes:
  # Named volumes to persist Playwright browser data across container restarts
  # This prevents IBM from asking for 2FA every time
  playwright-cache:
  playwright-config:

networks:
  defect-monitor-network:
    driver: bridge

